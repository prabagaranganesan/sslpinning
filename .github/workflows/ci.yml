# Backend CI/CD: test → trigger Render deploy → ProxyHawk Guard checkpoint.
#
# Setup (one-time on Render):
#   1. Service → Settings → turn OFF "Auto-Deploy" (GitHub Actions owns deploys).
#   2. Service → Settings → Deploy Hook → copy URL.
#   3. GitHub repo → Settings → Secrets:
#        RENDER_DEPLOY_HOOK = deploy hook URL
#        RENDER_API_KEY       = Render API key (Account Settings → API Keys)
#          Used to wait until the deploy is live before Guard runs.
#          Without it, CI falls back to polling /api/health gitSha only.
#
# Optional repo variable: API_URL (default https://sslpinning-api.onrender.com)

name: Backend CI / CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Run tests
        run: mvn -B test

  deploy:
    name: Deploy → Render
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://sslpinning-api.onrender.com

    steps:
      - name: Trigger Render deploy
        id: trigger
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          if [ -z "${RENDER_DEPLOY_HOOK}" ]; then
            echo "::error::Missing RENDER_DEPLOY_HOOK secret."
            echo "Render → your service → Settings → Deploy Hook → add URL as a GitHub secret."
            echo "Also disable Auto-Deploy on Render so only this workflow triggers deploys."
            exit 1
          fi
          hook="${RENDER_DEPLOY_HOOK}"
          case "${hook}" in
            *\?*) deploy_url="${hook}&ref=${EXPECTED_SHA}" ;;
            *) deploy_url="${hook}?ref=${EXPECTED_SHA}" ;;
          esac
          echo "Triggering Render deploy for commit ${EXPECTED_SHA} ..."
          response="$(curl -sf -X POST "${deploy_url}")"
          echo "${response}"
          deploy_id="$(printf '%s' "${response}" | python3 -c 'import sys,json; print(json.load(sys.stdin).get("deploy",{}).get("id",""))')"
          service_id="$(printf '%s' "${hook}" | python3 -c 'import sys,re; m=re.search(r"/deploy/(srv-[^/?]+)", sys.stdin.read()); print(m.group(1) if m else "")')"
          if [ -z "${deploy_id}" ]; then
            echo "::warning::Deploy hook response did not include deploy.id — will infer completion from /api/health gitSha."
          fi
          echo "deploy_id=${deploy_id}" >> "${GITHUB_OUTPUT}"
          echo "service_id=${service_id}" >> "${GITHUB_OUTPUT}"

      - name: Wait for Render deploy to complete
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: ${{ steps.trigger.outputs.service_id }}
          DEPLOY_ID: ${{ steps.trigger.outputs.deploy_id }}
        run: |
          if [ -z "${RENDER_API_KEY}" ]; then
            echo "RENDER_API_KEY not set — skipping Render deploy-status polling."
            echo "Will wait for live traffic to report the new commit on /api/health instead."
            exit 0
          fi
          if [ -z "${SERVICE_ID}" ] || [ -z "${DEPLOY_ID}" ]; then
            echo "Missing Render service/deploy id — skipping deploy-status polling."
            exit 0
          fi
          echo "Waiting for Render deploy ${DEPLOY_ID} on ${SERVICE_ID} to finish ..."
          for attempt in $(seq 1 60); do
            body="$(curl -sf \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              -H "Accept: application/json" \
              "https://api.render.com/v1/services/${SERVICE_ID}/deploys/${DEPLOY_ID}" 2>/dev/null || true)"
            if [ -z "${body}" ]; then
              echo "Attempt ${attempt}/60 — deploy status unavailable, retrying in 15s ..."
              sleep 15
              continue
            fi
            status="$(printf '%s' "${body}" | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get("status") or d.get("deploy",{}).get("status",""))')"
            echo "Attempt ${attempt}/60 — Render deploy status: ${status}"
            case "${status}" in
              live)
                echo "Render deploy is live."
                exit 0
                ;;
              build_failed|canceled|deactivated)
                echo "::error::Render deploy failed with status: ${status}"
                exit 1
                ;;
            esac
            sleep 15
          done
          echo "::error::Render deploy did not reach live within ~15 minutes"
          exit 1

      - name: Verify live commit on API
        env:
          API_URL: ${{ vars.API_URL || 'https://sslpinning-api.onrender.com' }}
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          echo "Verifying ${API_URL}/api/health reports commit ${EXPECTED_SHA} ..."
          for attempt in $(seq 1 24); do
            body="$(curl -sf "${API_URL}/api/health" 2>/dev/null || true)"
            if [ -n "${body}" ]; then
              actual="$(printf '%s' "${body}" | python3 -c 'import sys,json; print(json.load(sys.stdin).get("gitSha",""))')"
              echo "Attempt ${attempt}/24 — health=${body}"
              if [ "${actual}" = "${EXPECTED_SHA}" ]; then
                echo "Live API is serving the expected commit."
                exit 0
              fi
              if [ -n "${actual}" ] && [ "${#actual}" -ge 7 ] && [ "${EXPECTED_SHA#${actual}}" != "${EXPECTED_SHA}" ]; then
                echo "Live API is serving the expected commit (short SHA prefix)."
                exit 0
              fi
            else
              echo "Attempt ${attempt}/24 — health check unreachable"
            fi
            sleep 10
          done
          echo "::error::Live API did not report commit ${EXPECTED_SHA} within ~4 minutes after deploy completed"
          exit 1

  guard-checkpoint:
    name: ProxyHawk Guard checkpoint
    needs: deploy
    if: github.event_name == 'push'
    uses: ./.github/workflows/guard-deploy-pr-check.yml
    with:
      environment: dev
      commit_sha: ${{ github.sha }}
      run_mode: headless
      fail_on_guard_issues: false
    secrets: inherit

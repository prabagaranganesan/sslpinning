# Backend CI/CD: test → trigger Render deploy → ProxyHawk Guard checkpoint.
#
# Setup (one-time on Render):
#   1. Service → Settings → turn OFF "Auto-Deploy" (GitHub Actions owns deploys).
#   2. Service → Settings → Deploy Hook → copy URL.
#   3. GitHub repo → Settings → Secrets → RENDER_DEPLOY_HOOK = that URL.
#
# Optional repo variable: API_URL (default https://sslpinning-api.onrender.com)

name: Backend CI / CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Run tests
        run: mvn -B test

  deploy:
    name: Deploy → Render
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://sslpinning-api.onrender.com

    steps:
      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          if [ -z "${RENDER_DEPLOY_HOOK}" ]; then
            echo "::error::Missing RENDER_DEPLOY_HOOK secret."
            echo "Render → your service → Settings → Deploy Hook → add URL as a GitHub secret."
            echo "Also disable Auto-Deploy on Render so only this workflow triggers deploys."
            exit 1
          fi
          hook="${RENDER_DEPLOY_HOOK}"
          case "${hook}" in
            *\?*) deploy_url="${hook}&ref=${EXPECTED_SHA}" ;;
            *) deploy_url="${hook}?ref=${EXPECTED_SHA}" ;;
          esac
          echo "Triggering Render deploy for commit ${EXPECTED_SHA} ..."
          curl -sf -X POST "${deploy_url}"
          echo "Deploy hook accepted."

      - name: Wait for deployed commit
        env:
          API_URL: ${{ vars.API_URL || 'https://sslpinning-api.onrender.com' }}
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          echo "Render Docker builds often take 3–8 minutes — waiting before polling ..."
          sleep 180
          echo "Waiting for ${API_URL}/api/health to report commit ${EXPECTED_SHA} ..."
          for attempt in $(seq 1 48); do
            body="$(curl -sf "${API_URL}/api/health" 2>/dev/null || true)"
            if [ -n "${body}" ]; then
              actual="$(printf '%s' "${body}" | python3 -c 'import sys,json; print(json.load(sys.stdin).get("gitSha",""))')"
              echo "Attempt ${attempt}/48 — health=${body}"
              if [ "${actual}" = "${EXPECTED_SHA}" ]; then
                echo "Deploy live at expected commit."
                exit 0
              fi
              # Render may expose a short SHA prefix in some setups.
              if [ -n "${actual}" ] && [ "${#actual}" -ge 7 ] && [ "${EXPECTED_SHA#${actual}}" != "${EXPECTED_SHA}" ]; then
                echo "Deploy live at expected commit (short SHA prefix)."
                exit 0
              fi
              if [ -z "${actual}" ] || [ "${actual}" = "unknown" ]; then
                echo "  (previous deploy still serving — new build not live yet)"
              fi
            else
              echo "Attempt ${attempt}/48 — health check unreachable"
            fi
            sleep 15
          done
          echo "::error::Deploy did not reach commit ${EXPECTED_SHA} within ~15 minutes"
          exit 1

  guard-checkpoint:
    name: ProxyHawk Guard checkpoint
    needs: deploy
    if: github.event_name == 'push'
    uses: ./.github/workflows/guard-deploy-pr-check.yml
    with:
      environment: dev
      commit_sha: ${{ github.sha }}
      run_mode: headless
      fail_on_guard_issues: false
    secrets: inherit

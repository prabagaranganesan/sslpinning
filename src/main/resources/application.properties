# Render/Fly/Railway set PORT; local default 8090 (8080/8083 often taken by other dev servers).
server.port=${PORT:8090}
# Listen on all interfaces (local LAN + containers).
server.address=0.0.0.0
spring.application.name=sslpinning-api

# Demo user (workshop only — override in production)
app.demo.username=${DEMO_USERNAME:demo}
app.demo.password=${DEMO_PASSWORD:demo123}

# JWT access tokens (set JWT_SECRET in production)
app.jwt.secret=${JWT_SECRET:demo-jwt-secret-change-in-production-must-be-at-least-256-bits-long!!}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

